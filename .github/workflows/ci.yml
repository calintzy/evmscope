name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [created]

jobs:
  ci:
    name: Test & Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Node.js ${{ matrix.node-version }} 설정
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build

  publish:
    name: NPM 배포
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'created'

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: 이미 배포된 버전인지 확인
        id: version-check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view evmscope versions --json 2>/dev/null || echo "[]")
          if echo "$PUBLISHED" | grep -q "\"$PACKAGE_VERSION\""; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ v$PACKAGE_VERSION 이미 배포됨 — 스킵"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "📦 v$PACKAGE_VERSION 배포 시작"
          fi

      - run: npm publish
        if: steps.version-check.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
